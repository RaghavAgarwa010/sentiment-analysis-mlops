services:
  api:
    image: ghcr.io/raghavagarwa010/sentiment-analysis-mlops-api:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - prediction_logs:/app/logs
    restart: unless-stopped

  streamlit:
    image: ghcr.io/raghavagarwa010/sentiment-analysis-mlops-streamlit:latest
    environment:
      - API_URL=http://api:8000
    volumes:
      - prediction_logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - streamlit
    restart: unless-stopped

volumes:
  prediction_logs: